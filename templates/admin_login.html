{% extends "base.html" %}
{% block title %}Prefeitura de Seberi - Acesso Administrativo{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col bg-gradient-to-br from-primary-500 via-primary-600 to-primary-800">
    <!-- Header -->
    <nav class="w-full px-6 py-5">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <img src="{{ url_for('static', filename='logo-seberi.png') }}"
                     alt="Prefeitura Seberi" class="w-9 h-9 rounded-full object-cover">
                <span class="text-white font-semibold text-lg">Prefeitura de Seberi</span>
            </div>
            <a href="/" class="text-white/70 hover:text-white text-sm transition-colors">
                &larr; Voltar ao site
            </a>
        </div>
    </nav>

    <!-- Login Card -->
    <div class="flex-1 flex items-center justify-center px-4 pb-20">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-2xl p-8 sm:p-10">
                <div class="text-center mb-8">
                    <img src="{{ url_for('static', filename='logo-seberi.png') }}"
                         alt="Prefeitura Seberi" class="w-16 h-16 mx-auto mb-4 rounded-full">
                    <h2 class="text-2xl font-bold text-gray-800">Acesso Restrito</h2>
                    <p class="text-gray-500 mt-1">Área administrativa do sistema</p>
                </div>

                {% if error %}
                <div class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-center">
                    <p class="text-red-700 text-sm font-medium">{{ error }}</p>
                </div>
                {% endif %}

                <form method="POST" action="/admin/login" class="space-y-5">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha administrativa</label>
                        <input type="password" id="password" name="password" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                               placeholder="Digite a senha">
                    </div>
                    <button type="submit"
                            class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3.5 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-primary-500/25 active:scale-[0.98]">
                        Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
